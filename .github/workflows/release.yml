name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build Windows executable
        run: pyinstaller --clean --noconfirm kmz_inspector_windows.spec

      - name: Package Windows artifact
        shell: pwsh
        run: Compress-Archive -Path dist/KMZInspector/* -DestinationPath KMZInspector-windows.zip

      - name: Upload release assets (Windows)
        uses: softprops/action-gh-release@v2
        with:
          files: KMZInspector-windows.zip

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build macOS app bundle
        run: pyinstaller --clean --noconfirm kmz_inspector.spec

      - name: Package macOS artifact
        run: ditto -c -k --sequesterRsrc --keepParent dist/KMZInspector.app KMZInspector-macos.zip

      - name: Upload release assets (macOS)
        uses: softprops/action-gh-release@v2
        with:
          files: KMZInspector-macos.zip
